<html>
<body style="font-family:Arial" bgcolor="lightblue">

<h1 style="text-align:center">Mikä päivä tänään on?</h1>
<h3 style="text-align:center">Välillä alkaa seota, mikä päivä nyt on. Mistä silloin voisi löytää varman vastauksen tuohon kysymykseen? Sen löydät täältä!</h3>

<p id="päivä"></p>

<script>
let day;
switch (new Date().getDay()) {
  case 0:
    day = "sunnuntai";
    break;
  case 1:
    day = "maanantai";
    break;
  case 2:
    day = "tiistai";
    break;
  case 3:
    day = "keskiviikko";
    break;
  case 4:
    day = "torstai";
    break;
  case 5:
    day = "perjantai";
    break;
  case  6:
    day = "lauantai";
}
document.getElementById("päivä").innerHTML = "Tänään on " + day + "."
</script>

</body>
</html>
