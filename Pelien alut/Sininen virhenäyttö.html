<html>
  <title>Sininen virhenäyttö - peliasema</title>
  <body style="font-family:Arial">
    <h1 style="text-align:center">Sininen virhenäyttö</h1>
    <p>Joskus kun pelaat peliaseman peliä, sinulle tulee
    sininen virhenäyttö. Se johtuu siitä, että pelin sisällä tapahtui
    jokin virhe.</p>
    <p>Virhenäyttö lähtee kyllä pois, kun käynnistät pelin uudelleen.</p>
  </body>
</html>
