    <h1>ClockOS</h1>
    <p>ClockOS on Hiiri522:n kehittämä käyttöjärjestelmä, jonka voit ladata ja asentaa erilaisiin äly- ja urheilukelloihin. Järjestelmä on yksinkertainen ja sen tavoitteena on antaa uutta elämää erityisesti vanhemmille kelloille.</p>
